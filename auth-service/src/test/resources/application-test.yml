spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: never

sa-token:
  token-name: Authorization
  timeout: 2592000
